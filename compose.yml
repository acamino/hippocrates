services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: hippocrates
      POSTGRES_PASSWORD: hippocrates
      POSTGRES_DB: hippocrates_development
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hippocrates -d hippocrates_development"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://hippocrates:hippocrates@postgres:5432/hippocrates_development
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "1"
      RAILS_SERVE_STATIC_FILES: "1"
      SECRET_KEY_BASE: dummy-secret-key-base-for-local-dev-only
      RAILS_ALLOWED_HOSTS: localhost
      RAILS_FORCE_SSL: "false"
      AWS_BUCKET: dummy
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/up || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
